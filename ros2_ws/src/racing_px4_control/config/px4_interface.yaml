offboard_mission:
  ros__parameters:
    auto_start: false
    allow_arming_command: false
    takeoff_altitude_m: 1.0
    forward_distance_m: 1.0
    hover_duration_s: 5.0
    warmup_duration_s: 1.0
    position_timeout_s: 1.0
    phase_timeout_s: 20.0
    target_tolerance_m: 0.25
    max_altitude_m: 2.0
    max_horizontal_distance_m: 3.0
    command_retry_s: 1.0
    # PX4 1.17 versioned output topics. Override these for older PX4 releases.
    local_position_topic: /fmu/out/vehicle_local_position_v1
    vehicle_status_topic: /fmu/out/vehicle_status_v1
    land_detected_topic: /fmu/out/vehicle_land_detected
